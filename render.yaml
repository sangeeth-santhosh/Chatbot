services:
  - type: web
    name: chatbot-api-sangeeth-santhosh
    runtime: node
    plan: free
    region: oregon
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URLS
        value: https://sangeeth-santhosh.github.io,http://localhost:5173,http://127.0.0.1:5173
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
